<!DOCTYPE html>
<html lang="en" class="dark no-js">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}" />
  <meta name="author" content="{{ config.title }}" />
  <meta name="robots" content="index, follow" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <link rel="canonical" href="{% block canonical %}{{ current_url | default(value=config.base_url | safe) | safe }}{% endblock canonical %}" />

  {% block og %}
  <meta property="og:site_name" content="{{ config.title }}" />
  <meta property="og:title" content="{{ config.title }}" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:url" content="{{ current_url | default(value=config.base_url | safe) | safe }}" />
  <meta property="og:image" content="{{ get_url(path='images/og-image.jpg') | safe }}" />
  <meta property="og:image:secure_url" content="{{ get_url(path='images/og-image.jpg') | safe }}" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="{{ config.title }}" />
  <meta property="og:description" content="{{ config.description }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ config.title }}" />
  <meta name="twitter:description" content="{{ config.description }}" />
  <meta name="twitter:image" content="{{ get_url(path='images/og-image.jpg') | safe }}" />
  <meta name="twitter:image:alt" content="{{ config.title }}" />
  {% endblock og %}

  {% block schema %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ config.title | json_encode | safe }},
    "description": {{ config.description | json_encode | safe }},
    "url": {{ config.base_url | json_encode | safe }}
  }
  </script>
  {% endblock schema %}

  <link rel="icon" href="{{ get_url(path='favicon.ico') | safe }}" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ get_url(path='icons/icon-16.png') | safe }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ get_url(path='icons/icon-32.png') | safe }}" />
  <link rel="icon" type="image/png" sizes="192x192" href="{{ get_url(path='icons/icon-192.png') | safe }}" />
  <link rel="apple-touch-icon" href="{{ get_url(path='icons/apple-touch-icon.png') | safe }}" />
  <link rel="manifest" href="{{ get_url(path='site.webmanifest') | safe }}" />

  <link rel="stylesheet" href="{{ get_url(path='css/main.css', cachebust=true) | safe }}" />
</head>
<body class="min-h-screen w-full bg-black text-white antialiased" x-data>
  {% block content %}{% endblock content %}

  <script src="{{ get_url(path='js/flowbite.min.js', cachebust=true) | safe }}" defer></script>
  <script src="{{ get_url(path='js/alpine.min.js', cachebust=true) | safe }}" defer></script>
  {% block scripts %}{% endblock scripts %}
</body>
</html>
